name: e2e

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows not supported by dfx
        os: [ubuntu-22.04, macos-15]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-ci-1

      - name: Install libudev (Linux)
        if: ${{ contains(matrix.os, 'ubuntu') }}
        run: sudo apt-get install -y libudev-dev

      - name: Install dfx
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main

      - name: Install coreutils (macOS)
        if: ${{ contains(matrix.os, 'macos') }}
        run: brew install coreutils

      # bats-core/bats-action@4.0.0 doesn't propagate GITHUB_TOKEN to its
      # internal shell steps, causing unauthenticated GitHub API 403 errors.
      - name: Install Bats and bats-support
        run: |
          BATS_DIR="$HOME/.local/share/bats"
          mkdir -p "$BATS_DIR"

          # Install bats-core
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh "$BATS_DIR"
          echo "$BATS_DIR/bin" >> "$GITHUB_PATH"

          # Install bats-support library
          git clone --depth 1 https://github.com/bats-core/bats-support.git "$BATS_DIR/bats-support"

          echo "BATS_LIB_PATH=$BATS_DIR" >> "$GITHUB_ENV"

      - name: Build release
        run: |
          cargo build --release --locked
          echo "$(pwd)/target/release" >> "$GITHUB_PATH"

      - name: Run e2e test
        run: timeout 2100 bats e2e/tests-quill/create_neuron.bash

  aggregate:
    name: e2e:required
    if: ${{ always() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: check e2e test result
        if: ${{ needs.test.result != 'success' }}
        run: exit 1
