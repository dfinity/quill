name: CI

on: pull_request

jobs:
  ci:
    name: ${{ matrix.task.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-15-intel
          - macos-14
          - macos-15
          - windows-2022
          - windows-2025
        task:
          - name: Clippy
            command: |
              cargo hack clippy --each-feature --no-dev-deps -- -D warnings
              cargo clippy --tests --benches -- -D warnings
          - name: Test
            command: cargo test
        include:
          # formatting doesn't depend on build environment, not included in main matrix
          - task:
              name: Format
              command: cargo fmt -- --check
            os: ubuntu-latest
    env:
      VCPKG_ROOT: 'C:\vcpkg'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ${{ env.VCPKG_ROOT }}
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-ci-1

      - name: Install libudev (Linux)
        if: ${{ contains(matrix.os, 'ubuntu') }}
        run: sudo apt-get install -y libudev-dev

      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2.75.1
        with:
          tool: cargo-hack@0.6.11

      - name: ${{ matrix.task.name }}
        run: ${{ matrix.task.command }}
  
  aggregate:
    name: ci:required
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: check result
        if: ${{ needs.ci.result != 'success' }}
        run: exit 1
